name: Deploy MeetAndNote

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Restore production env
        run: |
          cp /home/githubrunner/secrets/echoflow/.env .env

      - name: Deploy
        run: |
          chmod +x ./deploy-update.sh
          ./deploy-update.sh