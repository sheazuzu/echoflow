name: Deploy MeetAndNote

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Run application update deployment
        env:
          CI: true
        run: |
          chmod +x ./deploy-update.sh
          ./deploy-update.sh