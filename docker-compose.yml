services:
  mysql:
    profiles:
      - local-db
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=${DOCKER_MYSQL_ROOT_PASSWORD:-root123456}
      - MYSQL_DATABASE=${DOCKER_MYSQL_DATABASE:-echoflow}
      - MYSQL_USER=${DOCKER_MYSQL_USER:-echoflow}
      - MYSQL_PASSWORD=${DOCKER_MYSQL_PASSWORD:-echoflow123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${LOCAL_MYSQL_EXPOSE_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production

      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MYSQL_HOST=${DOCKER_MYSQL_HOST:-mysql}
      - MYSQL_PORT=${DOCKER_MYSQL_PORT:-3306}
      - MYSQL_USER=${DOCKER_MYSQL_USER:-echoflow}
      - MYSQL_PASSWORD=${DOCKER_MYSQL_PASSWORD:-echoflow123}
      - MYSQL_DATABASE=${DOCKER_MYSQL_DATABASE:-echoflow}
      - MYSQL_CONNECTION_LIMIT=${MYSQL_CONNECTION_LIMIT}
      - MYSQL_QUEUE_LIMIT=${MYSQL_QUEUE_LIMIT}
      - MYSQL_CHARSET=${MYSQL_CHARSET}
      - MYSQL_TIMEZONE=${MYSQL_TIMEZONE}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME}
      - AUTH_COOKIE_SAME_SITE=${AUTH_COOKIE_SAME_SITE}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET}
      - AUTH_SESSION_TTL_HOURS=${AUTH_SESSION_TTL_HOURS}
      - AUTH_RESET_TOKEN_TTL_MINUTES=${AUTH_RESET_TOKEN_TTL_MINUTES}
      - AUTH_EXPOSE_RESET_TOKEN=${AUTH_EXPOSE_RESET_TOKEN}
      - AUTH_MAX_FAILED_ATTEMPTS=${AUTH_MAX_FAILED_ATTEMPTS}
      - AUTH_FAILED_LOGIN_WINDOW_MINUTES=${AUTH_FAILED_LOGIN_WINDOW_MINUTES}
      - AUTH_LOCKOUT_MINUTES=${AUTH_LOCKOUT_MINUTES}
      - AUTH_DEFAULT_ROLE=${AUTH_DEFAULT_ROLE}
      - AUTH_PASSWORD_SALT_LENGTH=${AUTH_PASSWORD_SALT_LENGTH}
      - AUTH_PASSWORD_KEY_LENGTH=${AUTH_PASSWORD_KEY_LENGTH}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_ENDPOINT=${COS_ENDPOINT}
      - COS_REGION=${COS_REGION}
      
      # SMTP邮件服务配置
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=${BACKEND_RULE:-PathPrefix(`/api`)}"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=${FRONTEND_RULE:-PathPrefix(`/`)}"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # 反向代理 / 网关（Traefik）
  traefik:
    image: traefik:v2.11
    command:
      # 日志等级调成 DEBUG，方便看 Provider 是否加载成功
      - "--log.level=DEBUG"

      # 启用 Docker provider
      - "--providers.docker=true"
      # 指定 Docker socket（虽然有默认值，但显式写出来更清晰）
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      # 不自动暴露所有容器，必须有 traefik.enable=true 才暴露
      - "--providers.docker.exposedByDefault=false"
      # 指定使用的网络（与你 docker inspect 看到的 echoflow_default 对应）
      - "--providers.docker.network=echoflow_default"

      # 关键新增：不要过滤不健康的容器（允许路由照样生成）
      - "--providers.docker.useBindPortIP=false"
      - "--providers.docker.swarmMode=false"

      # 入口点配置
      - "--entrypoints.web.address=:80"
      # HTTP 自动重定向到 HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      
      - "--entrypoints.websecure.address=:443"
      
      # 启用 Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true"

      # 文件提供者（用于加载动态配置，如自签名证书）
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

      # Let's Encrypt 配置 (ACME)
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/dynamic:/etc/traefik/dynamic"
      - "./traefik/letsencrypt:/letsencrypt"
      - "./traefik/certs:/certs"
    restart: unless-stopped

volumes:
  mysql_data: